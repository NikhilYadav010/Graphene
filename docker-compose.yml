services:
  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
